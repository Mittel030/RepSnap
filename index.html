<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FF4D2E" />
  <meta name="description" content="RepSnap — social app voor jou en je crew." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="RepSnap" />
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="RepSnap — Gym. Friends. Gains." />
  <meta property="og:description" content="Private gym social app voor jou en je crew." />

  <title>RepSnap</title>
  <link rel="icon"             type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon"                      href="icons/icon-512.php" />
  <link rel="manifest"                              href="manifest.json" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#DC2626',
              hover:   '#C81E1E',
              dim:     'rgba(220,38,38,0.08)',
              glow:    'rgba(220,38,38,0.22)',
            },
            rs: {
              bg:  '#F7F6F4',
              s1:  '#FFFFFF',
              s2:  '#F3F2F0',
              s3:  '#EDEAE7',
              b1:  '#E8E5E2',
              b2:  '#D4D0CC',
              t1:  '#111827',
              t2:  '#374151',
              t3:  '#6B7280',
              t4:  '#A8A29E',
            }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-[#F7F6F4] text-[#111827] font-sans antialiased">

  <!-- App shell -->
  <div id="app" class="h-screen flex flex-col overflow-hidden mx-auto"
       style="max-width:430px;background:#F7F6F4;border-left:1px solid #EDEAE7;border-right:1px solid #EDEAE7;box-shadow:0 0 48px rgba(0,0,0,0.07);">

    <!-- Header -->
    <header id="app-header"
            class="flex-shrink-0 flex items-center justify-between px-4 py-3 z-40"
            style="display:none;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);border-bottom:1px solid #EDEAE7;">

      <div class="flex items-center gap-2.5">
        <svg width="32" height="32" viewBox="0 0 512 512" fill="none" aria-hidden="true">
          <circle cx="256" cy="256" r="150" fill="none" stroke="#DC2626" stroke-width="34"/>
          <g fill="#DC2626">
            <polygon points="360.00,256.00 308.00,346.07 258.79,295.90"/>
            <polygon points="308.00,346.07 204.00,346.07 222.84,278.37"/>
            <polygon points="204.00,346.07 152.00,256.00 220.05,238.47"/>
            <polygon points="152.00,256.00 204.00,165.93 253.21,216.10"/>
            <polygon points="204.00,165.93 308.00,165.93 289.16,233.63"/>
            <polygon points="308.00,165.93 360.00,256.00 291.95,273.53"/>
          </g>
          <circle cx="256" cy="256" r="30" fill="white"/>
        </svg>
        <span class="text-[21px] font-black tracking-tight leading-none text-[#111827]">RepSnap</span>
      </div>

      <button id="header-action"
              class="w-9 h-9 flex items-center justify-center rounded-full text-[#A8A29E]
                     hover:text-[#111827] hover:bg-[#F0EEEB] active:scale-90 transition-all duration-150">
      </button>
    </header>

    <!-- View mount -->
    <main id="view" class="flex-1 overflow-y-auto overscroll-contain"></main>

    <!-- Bottom nav -->
    <nav id="bottom-nav"
         class="flex-shrink-0 z-40"
         style="display:none;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);border-top:1px solid #EDEAE7;">
      <div class="flex items-center justify-around px-1 py-2">

        <button class="nav-btn group relative flex flex-col items-center gap-0.5 px-3 py-2 rounded-2xl transition-all duration-150 text-[#A8A29E]" data-route="feed">
          <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 21V12h6v9"/>
          </svg>
          <span class="text-[10px] font-semibold leading-none">Feed</span>
        </button>

        <button class="nav-btn group relative flex flex-col items-center gap-0.5 px-3 py-2 rounded-2xl transition-all duration-150 text-[#A8A29E]" data-route="friends">
          <div class="relative">
            <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
            <span id="friends-badge" class="badge-dot hidden"></span>
          </div>
          <span class="text-[10px] font-semibold leading-none">Friends</span>
        </button>

        <button class="nav-btn group relative flex flex-col items-center gap-0.5 px-3 py-2 rounded-2xl transition-all duration-150 text-[#A8A29E]" data-route="chat">
          <div class="relative">
            <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
          </div>
          <span class="text-[10px] font-semibold leading-none">Chat</span>
        </button>

        <button class="nav-btn group relative flex flex-col items-center gap-0.5 px-3 py-2 rounded-2xl transition-all duration-150 text-[#A8A29E]" data-route="groups">
          <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
          </svg>
          <span class="text-[10px] font-semibold leading-none">Groups</span>
        </button>

        <button class="nav-btn group relative flex flex-col items-center gap-0.5 px-3 py-2 rounded-2xl transition-all duration-150 text-[#A8A29E]" data-route="profile">
          <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <span class="text-[10px] font-semibold leading-none">Profile</span>
        </button>

      </div>
    </nav>
  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay"
       class="hidden fixed inset-0 z-50 flex items-end justify-center"
       style="background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);">
    <div id="modal-content"
         class="w-full overflow-hidden"
         style="max-width:430px;background:#FFFFFF;max-height:92vh;overflow-y:auto;
                border-radius:28px 28px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,0.14);">
      <div class="flex justify-center pt-3 pb-1">
        <div class="w-10 h-1 rounded-full bg-[#CCCAC7]"></div>
      </div>
    </div>
  </div>

  <!-- Double-tap heart burst -->
  <div id="heart-burst" class="hidden fixed pointer-events-none z-50 flex items-center justify-center" style="inset:0;">
    <span style="font-size:80px;line-height:1;" class="heart-burst-icon">❤️</span>
  </div>

  <script type="module" src="js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/Repsnap/sw.js', { scope: '/Repsnap/' });
    }
  </script>
</body>
</html>
